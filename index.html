  <style>
    :root{--cream:#fff9f3;--cream2:#f8eee6;--card:rgba(255,255,255,.86);--rose:#d98a9a;--rose2:#efc5c2;--plum:#493241;--muted:#836d78;--sage:#7fa68a;--gold:#d7a95f;--line:rgba(130,88,106,.16);--shadow:0 18px 45px rgba(73,50,65,.12);--danger:#b95f6b;--nav:82px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--plum);background:radial-gradient(circle at 8% -4%,#ffe2df 0,transparent 32%),radial-gradient(circle at 95% 0,#ead7ba 0,transparent 26%),linear-gradient(180deg,var(--cream),var(--cream2));min-height:100vh;-webkit-tap-highlight-color:transparent}.shell{max-width:980px;margin:0 auto;padding:14px 14px calc(var(--nav) + 24px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:8;margin:-14px -14px 14px;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;background:rgba(255,249,243,.78);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}.logo{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,var(--rose),#c87b92);color:white;display:grid;place-items:center;font-weight:1000;box-shadow:0 12px 28px rgba(217,138,154,.3)}h1,h2,h3{letter-spacing:-.04em;margin:0}h1{font-size:1.18rem}.sub,.hint,.tiny{color:var(--muted)}.sub{font-size:.78rem;margin-top:2px}.tiny{font-size:.74rem;line-height:1.35}.hint{font-size:.86rem;line-height:1.45}.sync{font-size:.72rem;font-weight:900;padding:8px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);white-space:nowrap}.sync.saving{color:var(--gold)}.sync.saved{color:var(--sage)}.sync.error{color:var(--danger)}.datebar{display:grid;grid-template-columns:46px 1fr 46px;gap:8px;margin-top:12px}button,input,select,textarea{font:inherit}button{border:0;border-radius:16px;min-height:44px;padding:10px 13px;font-weight:900;cursor:pointer;color:var(--plum)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.88);color:var(--plum);padding:12px;outline:none}textarea{min-height:90px;resize:vertical;line-height:1.4}label{display:block;font-size:.78rem;font-weight:900;color:var(--muted);margin-bottom:9px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px}.primary{background:linear-gradient(135deg,var(--rose),#c77b91);color:#fff;box-shadow:0 12px 24px rgba(217,138,154,.22)}.soft{background:rgba(255,255,255,.72);border:1px solid var(--line)}.good{background:rgba(127,166,138,.16);color:#51755c;border:1px solid rgba(127,166,138,.26)}.danger{background:rgba(185,95,107,.13);color:var(--danger);border:1px solid rgba(185,95,107,.24)}.small{min-height:34px;border-radius:12px;padding:7px 10px;font-size:.76rem}.full{width:100%}.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:16px;margin:14px 0;box-shadow:var(--shadow);backdrop-filter:blur(10px)}.hero{background:linear-gradient(135deg,#d98a9a,#b7778e);color:white;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-45px;top:-55px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.16)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{background:#fff;border:1px solid var(--line);border-radius:22px;padding:12px}.metric b{display:block;font-size:1.06rem;margin-top:2px}.bar{height:8px;border-radius:99px;background:#f3e4df;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;width:var(--w);border-radius:inherit;background:linear-gradient(90deg,var(--rose),var(--sage))}.pill{display:inline-flex;padding:7px 9px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.72rem;font-weight:900}.pill.good{background:rgba(127,166,138,.16)}.tab{display:none;animation:fade .18s ease}.tab.active{display:block}@keyframes fade{from{opacity:.6;transform:translateY(5px)}to{opacity:1;transform:none}}.nav{position:fixed;left:0;right:0;bottom:0;z-index:9;height:calc(var(--nav) + env(safe-area-inset-bottom));padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.82);backdrop-filter:blur(20px);border-top:1px solid var(--line)}.navin{max-width:760px;margin:auto;height:100%;display:grid;grid-auto-flow:column;grid-auto-columns:minmax(76px,1fr);gap:6px;overflow-x:auto;scrollbar-width:none}.nav button{background:transparent;color:var(--muted);display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;font-size:1.05rem}.nav span{font-size:.66rem;font-weight:1000}.nav button.active{background:rgba(217,138,154,.15);border:1px solid var(--line);color:var(--plum)}.check{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:11px;margin:8px 0}.dot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#f8e1dd;color:var(--rose);font-weight:1000}.check.done .dot{background:rgba(127,166,138,.18);color:var(--sage)}.row,.exercise{background:#fff;border:1px solid var(--line);border-radius:20px;padding:12px;margin-top:9px}.row{display:grid;grid-template-columns:1fr auto;gap:9px;align-items:start}.actions{display:flex;gap:6px;flex-wrap:wrap}.setgrid{display:grid;grid-template-columns:1fr 1fr 1fr 40px;gap:7px;align-items:end;margin-top:8px}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.login .card{max-width:430px;width:100%}.toast{position:fixed;left:50%;bottom:calc(var(--nav) + 18px);transform:translateX(-50%) translateY(10px);background:var(--plum);color:white;border-radius:999px;padding:10px 14px;opacity:0;transition:.2s;z-index:20;max-width:calc(100% - 30px);text-align:center;font-size:.83rem}.toast.show{opacity:1;transform:translateX(-50%)}canvas{width:100%;height:230px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:8px}.hidden{display:none!important}@media(min-width:720px){.metrics{grid-template-columns:repeat(4,1fr)}.grid2.wide{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<div id="login" class="login hidden"><div class="card"><div class="logo">D</div><h1 style="margin-top:12px">Dante's Fitness Diary</h1><p class="hint">Private online diary with Supabase email login. Your local draft cache still works if connection drops.</p><label>Email<input id="email" type="email" autocomplete="email"></label><label>Password<input id="password" type="password" autocomplete="current-password"></label><div class="grid2"><button class="primary" id="signIn">Log in</button><button class="soft" id="signUp">Create account</button></div><p class="tiny">Use the anon key only. Never paste a service role key into this app.</p></div></div>
<div id="app" class="shell hidden"><header class="top"><div class="brand"><div style="display:flex;gap:10px;align-items:center"><div class="logo">D</div><div><h1>Dante's Fitness Diary</h1><div class="sub" id="subtitle">Premium v4 wellness diary</div></div></div><div style="display:flex;gap:8px;align-items:center"><span class="sync saved" id="sync">Local draft</span><button class="soft small" id="logout">Logout</button></div></div><div class="datebar"><button class="soft" id="prev">‹</button><input type="date" id="date"><button class="soft" id="next">›</button></div></header><main id="tabs"></main></div>
<nav class="nav hidden" id="nav"><div class="navin"></div></nav><div class="toast" id="toast"></div>
<script>
'use strict';
const SUPABASE_URL_HERE='SUPABASE_URL_HERE';
const SUPABASE_ANON_KEY_HERE='SUPABASE_ANON_KEY_HERE';
const APP_VERSION=4, CACHE_VERSION='v4.0.0-2026-06-16';
const STORAGE_KEY='dantesFitnessDiary.v4.draft', OLD_KEYS=['phase1FitnessDiary.mobile.v3','phase1FitnessDiary.mobile.v2','phase1FitnessDiary.mobile.v1'];
const START_DATE='2026-06-05', END_DATE='2026-07-02', DAY_MS=86400000;
const tabs=[['today','🏠','Today'],['nutrition','🍓','Nutrition'],['workouts','🏋️','Workouts'],['cycle','🌙','Cycle'],['mood','✨','Mood'],['progress','📈','Progress'],['weekly','📝','Weekly'],['history','📖','History'],['backup','🔐','Backup'],['settings','⚙️','Settings']];
const presets={pull:'Pull',push:'Push',legsA:'Legs A',legsB:'Legs B',mobility:'Mobility',rest:'Rest',custom:'Custom'};
let supabaseClient=null,user=null,profileId=null,state=loadLocal(),selectedDate=initialDate(),activeTab='today',saveTimer=null,toastTimer=null;
function parseDate(s){const [y,m,d]=String(s).split('-').map(Number);return new Date(y,(m||1)-1,d||1)}function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/DAY_MS)}function allDates(){let a=[],d=parseDate(START_DATE);while(fmt(d)<=END_DATE){a.push(fmt(d));d=addDays(d,1)}return a}function clampDate(s){if(s<START_DATE)return START_DATE;if(s>END_DATE)return END_DATE;return s}function initialDate(){return clampDate(fmt(new Date()))}function n(v){const x=Number(v);return Number.isFinite(x)?x:0}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function defaultSettings(){return{clientName:'Dante',caloriesTarget:1800,proteinTarget:130,stepsTarget:8000,weightGoalKg:65,startWeightKg:67,cycleLength:28,periodLength:5,lastPeriodStart:'',reminderWeight:true,reminderNutrition:true,reminderSteps:true,reminderWorkout:true,reminderMood:true,reminderCycle:true,reminderNotes:false,reminderWater:false}}
function defaultDay(){return{weightKg:'',weightTime:'',measurements:{waistCm:'',hipsCm:'',thighCm:'',bustCm:''},dailyCaloriesTotal:'',dailyProteinTotal:'',foodNotes:'',nutritionLogged:false,steps:'',cardioType:'',cardioMinutes:'',workoutStatus:'',workoutPreset:'',workoutDuration:'',workoutPerformance:'',workoutNotes:'',workoutExercises:[],mood:'',energy:'',sleepHours:'',stress:'',bleeding:'',symptoms:'',cravings:'',periodStart:false,periodEnd:false,cycleNotes:'',notes:'',legacyMealLogs:[],legacyWaterMl:''}}
function createState(){const days={};allDates().forEach(d=>days[d]={...defaultDay(),workoutPreset:plannedPreset(d)});return{version:4,appVersion:CACHE_VERSION,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),settings:defaultSettings(),days,weeklyCheckins:{1:{},2:{},3:{},4:{}}}}
function loadLocal(){for(const k of [STORAGE_KEY,...OLD_KEYS]){try{const raw=localStorage.getItem(k);if(raw)return migrate(JSON.parse(raw))}catch(e){}}return createState()}
function validate(x){if(!x||typeof x!=='object')throw Error('Backup is empty.');if(!x.days||typeof x.days!=='object')throw Error('Missing days object.');if(!x.settings||typeof x.settings!=='object')throw Error('Missing settings object.');}
function migrate(old){validate(old);const fresh=createState();fresh.createdAt=old.createdAt||fresh.createdAt;fresh.settings={...fresh.settings,...old.settings,reminderWater:false};delete fresh.settings.waterTargetMl;fresh.weeklyCheckins=old.weeklyCheckins||old.checkins||fresh.weeklyCheckins;const source=old.days||{};Object.keys(source).forEach(date=>{const od=source[date]||{},meals=Array.isArray(od.meals)?od.meals:[],totalMeal=meals.find(m=>String(m.name||'').toLowerCase()==='total');const mealCalories=totalMeal&&n(totalMeal.calories)?n(totalMeal.calories):meals.reduce((s,m)=>s+n(m.calories),0);const mealProtein=totalMeal&&n(totalMeal.protein)?n(totalMeal.protein):meals.reduce((s,m)=>s+n(m.protein),0);fresh.days[date]={...defaultDay(),...od,measurements:{waistCm:od.waistCm||od.measurements?.waistCm||'',hipsCm:od.hipsCm||od.measurements?.hipsCm||'',thighCm:od.thighCm||od.measurements?.thighCm||'',bustCm:od.bustCm||od.measurements?.bustCm||''},dailyCaloriesTotal:od.dailyCaloriesTotal||od.caloriesTotal||mealCalories||'',dailyProteinTotal:od.dailyProteinTotal||od.proteinTotal||mealProtein||'',foodNotes:od.foodNotes||'',nutritionLogged:Boolean(od.nutritionLogged||od.dailyCaloriesTotal||od.dailyProteinTotal||mealCalories||mealProtein),legacyMealLogs:od.legacyMealLogs||meals,legacyWaterMl:od.legacyWaterMl||od.waterMl||'',workoutExercises:Array.isArray(od.workoutExercises)?od.workoutExercises:[],workoutPreset:od.workoutPreset||plannedPreset(date)};delete fresh.days[date].meals;delete fresh.days[date].waterMl;});ensureDates(fresh);fresh.version=4;fresh.appVersion=CACHE_VERSION;fresh.updatedAt=new Date().toISOString();return fresh}
function ensureDates(s=state){allDates().forEach(d=>{s.days[d]={...defaultDay(),...(s.days[d]||{})};if(!s.days[d].measurements)s.days[d].measurements={};if(!Array.isArray(s.days[d].legacyMealLogs))s.days[d].legacyMealLogs=[];if(!Array.isArray(s.days[d].workoutExercises))s.days[d].workoutExercises=[];if(!s.days[d].workoutPreset)s.days[d].workoutPreset=plannedPreset(d)});s.settings={...defaultSettings(),...(s.settings||{}),reminderWater:false};delete s.settings.waterTargetMl}
function plannedPreset(date){return{1:'pull',2:'mobility',3:'push',4:'mobility',5:'legsA',6:'legsB',0:'rest'}[parseDate(date).getDay()]}
function day(date=selectedDate){return state.days[date]||(state.days[date]={...defaultDay(),workoutPreset:plannedPreset(date)})}function totals(d){return{cal:n(d.dailyCaloriesTotal)||d.legacyMealLogs.reduce((s,m)=>s+n(m.calories),0),pro:n(d.dailyProteinTotal)||d.legacyMealLogs.reduce((s,m)=>s+n(m.protein),0)}}
async function initAuth(){supabaseClient=(SUPABASE_URL_HERE.startsWith('http')&&SUPABASE_ANON_KEY_HERE.length>30)?supabase.createClient(SUPABASE_URL_HERE,SUPABASE_ANON_KEY_HERE):null;document.getElementById('signIn').onclick=()=>auth('signIn');document.getElementById('signUp').onclick=()=>auth('signUp');document.getElementById('logout').onclick=async()=>{if(supabaseClient)await supabaseClient.auth.signOut();user=null;showLogin()};if(!supabaseClient){showApp();setSync('Offline draft saved','error');toast('Add Supabase URL and anon key to enable login.');return}const {data}=await supabaseClient.auth.getSession();user=data.session?.user||null;if(user)await loadOnline();else showLogin();supabaseClient.auth.onAuthStateChange(async(_e,session)=>{user=session?.user||null;if(user)await loadOnline();else showLogin()})}
async function auth(mode){try{const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;if(mode==='signUp')await supabaseClient.auth.signUp({email,password});else await supabaseClient.auth.signInWithPassword({email,password})}catch(e){toast(e.message)}}
async function loadOnline(){showApp();setSync('Loading online…','saving');const {data,error}=await supabaseClient.from('diary_profiles').select('id,diary_data').eq('user_id',user.id).maybeSingle();if(error){setSync('Sync error','error');toast(error.message);return}if(data){profileId=data.id;state=migrate(data.diary_data);saveLocal(false);setSync('Saved online','saved')}else{state=migrate(state);const ins=await supabaseClient.from('diary_profiles').insert({user_id:user.id,diary_data:state}).select('id').single();if(ins.error){setSync('Sync error','error');toast(ins.error.message)}else{profileId=ins.data.id;setSync('Saved online','saved')}}render()}
function saveLocal(queue=true){ensureDates();state.version=4;state.updatedAt=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));if(queue)queueSave()}function queueSave(){if(!user||!supabaseClient||!profileId){setSync('Offline draft saved','error');return}setSync('Saving…','saving');clearTimeout(saveTimer);saveTimer=setTimeout(saveOnline,750)}async function saveOnline(){const {error}=await supabaseClient.from('diary_profiles').update({diary_data:state,updated_at:new Date().toISOString()}).eq('id',profileId);setSync(error?'Sync error':'Saved online',error?'error':'saved');if(error)toast(error.message)}function setSync(t,c){const el=document.getElementById('sync');el.textContent=t;el.className='sync '+(c||'')}
function showLogin(){document.getElementById('login').classList.remove('hidden');document.getElementById('app').classList.add('hidden');document.getElementById('nav').classList.add('hidden')}function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('nav').classList.remove('hidden')}
function render(){document.getElementById('date').value=selectedDate;document.getElementById('date').min=START_DATE;document.getElementById('date').max=END_DATE;document.getElementById('subtitle').textContent=(fmt(new Date())<START_DATE||fmt(new Date())>END_DATE)?`Showing closest phase date: ${selectedDate}`:`Today is ${selectedDate}`;document.querySelector('.navin').innerHTML=tabs.map(t=>`<button class="${activeTab===t[0]?'active':''}" onclick="tab('${t[0]}')">${t[1]}<span>${t[2]}</span></button>`).join('');document.getElementById('tabs').innerHTML=tabs.map(t=>`<section id="tab-${t[0]}" class="tab ${activeTab===t[0]?'active':''}">${renderTab(t[0])}</section>`).join('');if(activeTab==='progress')drawCharts()}
function renderTab(t){return({today:today,nutrition:nutrition,workouts:workouts,cycle:cycle,mood:mood,progress:progress,weekly:weekly,history:history,backup:backup,settings:settings}[t])()}
function today(){const d=day(),to=totals(d),st=streak(),wk=weekStats(weekNo(selectedDate));return`<div class="card hero"><h2>Hi Dante — ${greeting()} check-in</h2><p>${selectedDate} • phase day ${daysBetween(START_DATE,selectedDate)+1}. Keep it simple, honest, and kind.</p></div><div class="metrics">${metric('Weight',d.weightKg?d.weightKg+' kg':'—')}${metric('Calories',`${Math.round(to.cal)||0} / ${state.settings.caloriesTarget}`,pct(to.cal,state.settings.caloriesTarget))}${metric('Protein',`${Math.round(to.pro)||0}g / ${state.settings.proteinTarget}g`,pct(to.pro,state.settings.proteinTarget))}${metric('Steps',d.steps||'—',pct(n(d.steps),state.settings.stepsTarget))}${metric('Cycle day',cycleDay(selectedDate)||'—')}${metric('Mood',d.mood?d.mood+'/5':'—')}${metric('Sleep',d.sleepHours?d.sleepHours+'h':'—')}${metric('Workout',workoutLabel(d.workoutStatus))}${metric('Streak',st+' days')}${metric('Weekly progress',wk.completion+'%')}</div><div class="card"><h2>Quick log</h2><div class="grid2 wide"><label>Weight kg<input type="number" step="0.1" value="${esc(d.weightKg)}" onchange="upd('weightKg',this.value)"></label><label>Calories<input type="number" value="${esc(d.dailyCaloriesTotal)}" onchange="upd('dailyCaloriesTotal',this.value);upd('nutritionLogged',true)"></label><label>Protein g<input type="number" value="${esc(d.dailyProteinTotal)}" onchange="upd('dailyProteinTotal',this.value);upd('nutritionLogged',true)"></label><label>Steps<input type="number" value="${esc(d.steps)}" onchange="upd('steps',this.value)"></label><label>Cardio type<input value="${esc(d.cardioType)}" onchange="upd('cardioType',this.value)"></label><label>Cardio minutes<input type="number" value="${esc(d.cardioMinutes)}" onchange="upd('cardioMinutes',this.value)"></label></div></div><div class="card"><h2>Live checklist</h2>${check('Weight',!!d.weightKg,'weight time optional')}${check('Calories/protein',!!(to.cal||to.pro||d.nutritionLogged),'simple end-of-day totals')}${check('Steps/cardio',!!(d.steps||d.cardioMinutes),'movement logged')}${check('Workout status',!!d.workoutStatus,'completed, rest, or did not workout')}${check('Mood/energy/sleep/stress',!!(d.mood&&d.energy&&d.sleepHours&&d.stress),'wellness check')}${check('Cycle',!!(d.bleeding||d.symptoms||d.periodStart||d.periodEnd),'body check')}${check('Notes',!!d.notes,'optional reflection')}</div>`}
function nutrition(){const d=day();return`<div class="card"><h2>Nutrition</h2><p class="hint">No meal-by-meal pressure. Add the end-of-day totals from your app or estimate.</p><div class="grid2"><label>Total calories<input type="number" value="${esc(d.dailyCaloriesTotal)}" onchange="upd('dailyCaloriesTotal',this.value);upd('nutritionLogged',true)"></label><label>Total protein g<input type="number" value="${esc(d.dailyProteinTotal)}" onchange="upd('dailyProteinTotal',this.value);upd('nutritionLogged',true)"></label></div><label>Food notes<textarea onchange="upd('foodNotes',this.value)" placeholder="Hunger, cravings, wins, meal ideas...">${esc(d.foodNotes)}</textarea></label></div><details class="card"><summary><b>Old meal history</b> <span class="pill">${d.legacyMealLogs.length} legacy logs</span></summary>${d.legacyMealLogs.map(m=>`<div class="row"><div><b>${esc(m.name||'Meal')}</b><div class="tiny">${n(m.calories)} kcal • ${n(m.protein)}g protein ${m.notes?'• '+esc(m.notes):''}</div></div></div>`).join('')||'<p class="hint">No legacy meals for this day.</p>'}</details>`}
function workouts(){const d=day();return`<div class="card"><h2>Workout</h2><label>Preset<select onchange="upd('workoutPreset',this.value)">${Object.entries(presets).map(([k,v])=>opt(k,v,d.workoutPreset)).join('')}</select></label><div class="grid2"><button class="good" onclick="upd('workoutStatus','completed')">Completed</button><button class="soft" onclick="upd('workoutStatus','no_workout')">Did not workout today</button><button class="soft" onclick="upd('workoutStatus','rest')">Rest day</button><button class="danger" onclick="upd('workoutStatus','skipped')">Skipped</button></div><div class="grid2"><label>Duration min<input type="number" value="${esc(d.workoutDuration)}" onchange="upd('workoutDuration',this.value)"></label><label>Performance<select onchange="upd('workoutPerformance',this.value)">${['','hard','okay','good','great'].map(x=>opt(x,x||'Not rated',d.workoutPerformance)).join('')}</select></label></div><label>Workout notes<textarea onchange="upd('workoutNotes',this.value)">${esc(d.workoutNotes)}</textarea></label></div><div class="card"><h2>Exercises</h2>${d.workoutExercises.map((e,i)=>exercise(e,i)).join('')}<button class="primary full" onclick="addExercise()">Add exercise</button></div>`}
function exercise(e,i){return`<div class="exercise"><div class="row"><div><input value="${esc(e.name||'')}" placeholder="Exercise name" onchange="exUpd(${i},'name',this.value)"><label style="margin-top:8px"><input type="checkbox" ${e.skipped?'checked':''} onchange="exUpd(${i},'skipped',this.checked)" style="width:auto"> Mark skipped</label></div><button class="danger small" onclick="delExercise(${i})">Delete</button></div>${(e.sets||[]).map((s,j)=>`<div class="setgrid"><label>Set<input value="${j+1}" disabled></label><label>Reps<input value="${esc(s.reps||'')}" onchange="setUpd(${i},${j},'reps',this.value)"></label><label>Weight<input value="${esc(s.weight||'')}" onchange="setUpd(${i},${j},'weight',this.value)"></label><button class="danger small" onclick="delSet(${i},${j})">×</button></div>`).join('')}<div class="actions"><button class="soft small" onclick="addSet(${i})">Add set</button><input placeholder="Notes" value="${esc(e.notes||'')}" onchange="exUpd(${i},'notes',this.value)"></div></div>`}
function cycle(){const d=day();return`<div class="card"><h2>Cycle</h2><div class="grid2"><label>Bleeding<select onchange="upd('bleeding',this.value)">${['','none','spotting','light','medium','heavy'].map(x=>opt(x,x||'Not logged',d.bleeding)).join('')}</select></label><label>Cravings<input value="${esc(d.cravings)}" onchange="upd('cravings',this.value)"></label></div><div class="grid2"><label><input type="checkbox" ${d.periodStart?'checked':''} onchange="upd('periodStart',this.checked)" style="width:auto"> Period start</label><label><input type="checkbox" ${d.periodEnd?'checked':''} onchange="upd('periodEnd',this.checked)" style="width:auto"> Period end</label></div><label>Symptoms<textarea onchange="upd('symptoms',this.value)">${esc(d.symptoms)}</textarea></label><label>Cycle notes<textarea onchange="upd('cycleNotes',this.value)">${esc(d.cycleNotes)}</textarea></label></div>`}
function mood(){const d=day();return`<div class="card"><h2>Mood</h2><div class="grid2 wide">${range('mood','Mood',d.mood)}${range('energy','Energy',d.energy)}${range('stress','Stress',d.stress)}<label>Sleep hours<input type="number" step="0.1" value="${esc(d.sleepHours)}" onchange="upd('sleepHours',this.value)"></label></div><label>Journal<textarea onchange="upd('notes',this.value)">${esc(d.notes)}</textarea></label></div>`}
function progress(){const d=day(),m=d.measurements||{};return`<div class="card"><h2>Progress</h2><div class="grid2 wide"><label>Weight kg<input type="number" step="0.1" value="${esc(d.weightKg)}" onchange="upd('weightKg',this.value)"></label><label>Weight time<input type="time" value="${esc(d.weightTime)}" onchange="upd('weightTime',this.value)"></label><label>Waist cm<input value="${esc(m.waistCm)}" onchange="meas('waistCm',this.value)"></label><label>Hips cm<input value="${esc(m.hipsCm)}" onchange="meas('hipsCm',this.value)"></label><label>Thigh cm<input value="${esc(m.thighCm)}" onchange="meas('thighCm',this.value)"></label><label>Bust cm<input value="${esc(m.bustCm)}" onchange="meas('bustCm',this.value)"></label></div></div><div class="card"><h2>Charts</h2><canvas id="weightChart" width="700" height="260"></canvas><br><br><canvas id="calChart" width="700" height="260"></canvas></div>`}
function weekly(){return [1,2,3,4].map(w=>{const s=weekStats(w);return`<div class="card"><h2>Week ${w}</h2><div class="metrics">${metric('Weight days',s.weightDays+'/7')}${metric('Avg weight',s.avgWeight?s.avgWeight.toFixed(1)+' kg':'—')}${metric('Weight change',s.weightChange?s.weightChange.toFixed(1)+' kg':'—')}${metric('Calories days',s.calorieDays+'/7')}${metric('Avg calories',s.avgCalories?Math.round(s.avgCalories):'—')}${metric('Protein days',s.proteinDays+'/7')}${metric('Avg protein',s.avgProtein?Math.round(s.avgProtein)+'g':'—')}${metric('Calorie hits',s.calorieHits+'/7')}${metric('Protein hits',s.proteinHits+'/7')}${metric('Steps days',s.stepsDays+'/7')}${metric('Avg steps',s.avgSteps?Math.round(s.avgSteps):'—')}${metric('Workouts',s.workoutsCompleted)}${metric('Rest/no workout',s.noWorkoutDays)}${metric('Avg sleep',s.avgSleep?s.avgSleep.toFixed(1)+'h':'—')}${metric('Avg mood',s.avgMood?s.avgMood.toFixed(1):'—')}${metric('Avg energy',s.avgEnergy?s.avgEnergy.toFixed(1):'—')}${metric('Avg stress',s.avgStress?s.avgStress.toFixed(1):'—')}</div><h3>Missing entries</h3>${s.missing.map(x=>`<div class="row"><div><b>${x.date}</b><div class="tiny">${x.missing.join(', ')}</div></div><button class="soft small" onclick="selectedDate='${x.date}';tab('today');render()">Quick edit</button></div>`).join('')||'<p class="hint">No core gaps this week.</p>'}<p class="hint"><b>Coaching note:</b> ${coach(s)}</p></div>`}).join('')}
function history(){return`<div class="card"><h2>History</h2>${allDates().map(d=>{const x=day(d),to=totals(x);return`<div class="row"><div><b>${d}</b><div class="tiny">${Math.round(to.cal)||'—'} kcal • ${Math.round(to.pro)||'—'}g protein • ${x.weightKg||'—'} kg • ${workoutLabel(x.workoutStatus)}</div></div><button class="soft small" onclick="selectedDate='${d}';tab('today');render()">Open</button></div>`}).join('')}</div>`}
function backup(){return`<div class="card"><h2>Backup / Restore</h2><p class="hint">JSON exports are your safety net. Importing v3 automatically migrates to v4 and saves online when logged in.</p><div class="grid2"><button class="primary" onclick="exportJSON()">Export JSON</button><label class="soft btn" style="text-align:center">Import JSON<input class="hidden" type="file" accept="application/json,.json" onchange="importJSON(event)"></label><button class="good" onclick="exportDailyCSV()">Daily CSV</button><button class="soft" onclick="exportWeeklyCSV()">Weekly CSV</button></div></div><div class="card"><h2>Safety</h2><button class="danger full" onclick="resetLocal()">Reset local draft</button></div>`}
function settings(){const s=state.settings;return`<div class="card"><h2>Settings</h2><div class="grid2"><label>Name<input value="${esc(s.clientName)}" onchange="setg('clientName',this.value)"></label><label>Calories target<input type="number" value="${esc(s.caloriesTarget)}" onchange="setg('caloriesTarget',this.value)"></label><label>Protein target g<input type="number" value="${esc(s.proteinTarget)}" onchange="setg('proteinTarget',this.value)"></label><label>Steps target<input type="number" value="${esc(s.stepsTarget)}" onchange="setg('stepsTarget',this.value)"></label><label>Start weight kg<input value="${esc(s.startWeightKg)}" onchange="setg('startWeightKg',this.value)"></label><label>Goal weight kg<input value="${esc(s.weightGoalKg)}" onchange="setg('weightGoalKg',this.value)"></label><label>Cycle length<input value="${esc(s.cycleLength)}" onchange="setg('cycleLength',this.value)"></label><label>Latest period start<input type="date" value="${esc(s.lastPeriodStart)}" onchange="setg('lastPeriodStart',this.value)"></label></div><h3>Checklist reminders</h3>${['reminderWeight','reminderNutrition','reminderSteps','reminderWorkout','reminderMood','reminderCycle','reminderNotes'].map(k=>`<label class="check"><input type="checkbox" ${s[k]?'checked':''} onchange="setg('${k}',this.checked)" style="width:24px"><b>${k.replace('reminder','')}</b><span class="pill">${s[k]?'On':'Off'}</span></label>`).join('')}</div>`}
function metric(l,v,p){return`<div class="metric"><span class="tiny">${l}</span><b>${v}</b>${p!==undefined?`<div class="bar"><i style="--w:${Math.min(100,p)}%"></i></div>`:''}</div>`}function pct(a,b){return b?Math.round(n(a)/n(b)*100):0}function check(l,done,sub){return`<div class="check ${done?'done':''}"><div class="dot">${done?'✓':'·'}</div><div><b>${l}</b><div class="tiny">${sub}</div></div><span class="pill ${done?'good':''}">${done?'Done':'Open'}</span></div>`}function opt(v,l,c){return`<option value="${esc(v)}" ${String(v)===String(c)?'selected':''}>${esc(l)}</option>`}function range(k,l,v){return`<label>${l}: <b>${v||'—'}</b><input type="range" min="1" max="5" value="${v||3}" onchange="upd('${k}',this.value)"></label>`}
function upd(k,v){day()[k]=v;saveLocal();render()}function meas(k,v){day().measurements[k]=v;saveLocal();render()}function setg(k,v){state.settings[k]=v;if(k==='lastPeriodStart'&&v)state.settings.lastPeriodStart=v;saveLocal();render()}function tab(t){activeTab=t;render()}function addExercise(){day().workoutExercises.push({name:'',sets:[{reps:'',weight:''}],notes:'',skipped:false});saveLocal();render()}function delExercise(i){day().workoutExercises.splice(i,1);saveLocal();render()}function exUpd(i,k,v){day().workoutExercises[i][k]=v;saveLocal()}function addSet(i){day().workoutExercises[i].sets.push({reps:'',weight:''});saveLocal();render()}function delSet(i,j){day().workoutExercises[i].sets.splice(j,1);saveLocal();render()}function setUpd(i,j,k,v){day().workoutExercises[i].sets[j][k]=v;saveLocal()}
function weekNo(d){return Math.min(4,Math.floor(daysBetween(START_DATE,d)/7)+1)}function weekDates(w){return allDates().slice((w-1)*7,w*7)}function avg(a){const b=a.filter(x=>n(x)>0);return b.length?b.reduce((s,x)=>s+n(x),0)/b.length:0}function weekStats(w){const ds=weekDates(w),weights=[],cals=[],pros=[],steps=[],sleeps=[],moods=[],energy=[],stress=[],missing=[];let calorieHits=0,proteinHits=0,workoutsCompleted=0,noWorkoutDays=0;ds.forEach(date=>{const d=day(date),t=totals(d),miss=[];if(d.weightKg)weights.push(d.weightKg);else miss.push('weight');if(t.cal){cals.push(t.cal);if(Math.abs(t.cal-state.settings.caloriesTarget)<=100)calorieHits++}else miss.push('calories');if(t.pro){pros.push(t.pro);if(t.pro>=state.settings.proteinTarget)proteinHits++}else miss.push('protein');if(d.steps)steps.push(d.steps);else miss.push('steps');if(d.workoutStatus==='completed')workoutsCompleted++;if(['no_workout','rest'].includes(d.workoutStatus))noWorkoutDays++;if(!d.workoutStatus)miss.push('workout status');if(d.sleepHours)sleeps.push(d.sleepHours);if(d.mood)moods.push(d.mood);if(d.energy)energy.push(d.energy);if(d.stress)stress.push(d.stress);if(miss.length)missing.push({date,missing:miss})});return{weightDays:weights.length,avgWeight:avg(weights),weightChange:weights.length>1?n(weights[weights.length-1])-n(weights[0]):0,calorieDays:cals.length,avgCalories:avg(cals),proteinDays:pros.length,avgProtein:avg(pros),calorieHits,proteinHits,stepsDays:steps.length,avgSteps:avg(steps),workoutsCompleted,noWorkoutDays,avgSleep:avg(sleeps),avgMood:avg(moods),avgEnergy:avg(energy),avgStress:avg(stress),missing,completion:Math.round((ds.length*4-missing.reduce((s,x)=>s+x.missing.length,0))/(ds.length*4)*100)}}
function coach(s){if(s.calorieDays<4)return'Focus first on logging daily totals most days; consistency beats perfection.';if(s.proteinHits<3)return'Protein is the easiest win this week — add a simple high-protein snack.';if(s.avgSleep&&s.avgSleep<7)return'Sleep looks low, so keep workouts flexible and protect recovery.';return'Nice consistency. Keep the same simple routine and adjust only one variable at a time.'}function streak(){let c=0;for(const d of allDates().filter(x=>x<=selectedDate).reverse()){const t=totals(day(d));if(t.cal||t.pro||day(d).workoutStatus)c++;else break}return c}function cycleDay(date){const lp=state.settings.lastPeriodStart;if(!lp)return'';return (daysBetween(lp,date)%n(state.settings.cycleLength))+1}function workoutLabel(s){return({completed:'Completed',no_workout:'Did not workout',rest:'Rest',skipped:'Skipped'}[s]||'Not logged')}function greeting(){const h=new Date().getHours();return h<12?'morning':h<18?'afternoon':'evening'}
function drawCharts(){draw('weightChart',allDates().map(d=>({label:d.slice(5),value:n(day(d).weightKg)})).filter(x=>x.value),'Weight kg',n(state.settings.weightGoalKg));draw('calChart',allDates().map(d=>({label:d.slice(5),value:totals(day(d)).cal})).filter(x=>x.value),'Calories',n(state.settings.caloriesTarget))}function draw(id,data,title,target){const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d'),w=c.width,h=c.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#493241';ctx.font='700 18px system-ui';ctx.fillText(title,18,28);if(!data.length){ctx.fillText('Add data to see this chart.',18,62);return}const vals=data.map(x=>x.value).concat(target?[target]:[]);let min=Math.min(...vals),max=Math.max(...vals);if(min===max){min-=1;max+=1}const X=i=>45+(data.length===1?300:i*(w-70)/(data.length-1)),Y=v=>45+(max-v)*(h-90)/(max-min);ctx.strokeStyle='#ead6cd';for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(45,45+i*(h-90)/3);ctx.lineTo(w-20,45+i*(h-90)/3);ctx.stroke()}if(target){ctx.strokeStyle='#7fa68a';ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(45,Y(target));ctx.lineTo(w-20,Y(target));ctx.stroke();ctx.setLineDash([])}ctx.strokeStyle='#d98a9a';ctx.lineWidth=4;ctx.beginPath();data.forEach((p,i)=>i?ctx.lineTo(X(i),Y(p.value)):ctx.moveTo(X(i),Y(p.value)));ctx.stroke();data.forEach((p,i)=>{ctx.fillStyle='#d98a9a';ctx.beginPath();ctx.arc(X(i),Y(p.value),5,0,7);ctx.fill()})}
function exportJSON(){saveLocal(false);download(`dante-diary-v4-${fmt(new Date())}.json`,JSON.stringify(state,null,2),'application/json')}function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const incoming=migrate(JSON.parse(r.result));if(!confirm('Replace current diary with this migrated v4 backup?'))return;state=incoming;saveLocal();render();toast('Backup imported and migrated to v4.')}catch(err){alert('Import failed: '+err.message)}finally{e.target.value=''}};r.readAsText(f)}function exportDailyCSV(){const rows=[['date','phase_day','weight_kg','weight_time','calories','protein_g','steps','cardio_type','cardio_minutes','workout_status','workout_preset','workout_exercises_json','mood','energy','stress','sleep_hours','cycle_day','bleeding','symptoms','cravings','waist_cm','hips_cm','thigh_cm','bust_cm','notes','food_notes']];allDates().forEach(d=>{const x=day(d),t=totals(x),m=x.measurements;rows.push([d,daysBetween(START_DATE,d)+1,x.weightKg,x.weightTime,Math.round(t.cal)||'',Math.round(t.pro)||'',x.steps,x.cardioType,x.cardioMinutes,x.workoutStatus,x.workoutPreset,JSON.stringify(x.workoutExercises),x.mood,x.energy,x.stress,x.sleepHours,cycleDay(d),x.bleeding,x.symptoms,x.cravings,m.waistCm,m.hipsCm,m.thighCm,m.bustCm,x.notes,x.foodNotes])});download('dante-daily-v4.csv',csv(rows),'text/csv')}function exportWeeklyCSV(){const rows=[['week','weight_days','average_weight','weight_change','calorie_days','average_calories','protein_days','average_protein','calorie_target_hit_days','protein_target_hit_days','steps_days','average_steps','workouts_completed','rest_or_no_workout_days','average_sleep','average_mood','average_energy','average_stress','missing_entries']];[1,2,3,4].forEach(w=>{const s=weekStats(w);rows.push([w,s.weightDays,s.avgWeight,s.weightChange,s.calorieDays,s.avgCalories,s.proteinDays,s.avgProtein,s.calorieHits,s.proteinHits,s.stepsDays,s.avgSteps,s.workoutsCompleted,s.noWorkoutDays,s.avgSleep,s.avgMood,s.avgEnergy,s.avgStress,s.missing.length])});download('dante-weekly-v4.csv',csv(rows),'text/csv')}function csv(r){return r.map(row=>row.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n')}function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function resetLocal(){if(confirm('Reset local draft?')){state=createState();saveLocal();render()}}function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500)}
document.getElementById('date').onchange=e=>{selectedDate=clampDate(e.target.value);render()};document.getElementById('prev').onclick=()=>{selectedDate=clampDate(fmt(addDays(parseDate(selectedDate),-1)));render()};document.getElementById('next').onclick=()=>{selectedDate=clampDate(fmt(addDays(parseDate(selectedDate),1)));render()};window.addEventListener('online',()=>queueSave());window.addEventListener('beforeunload',()=>saveLocal(false));ensureDates();initAuth();render();saveLocal(false);
</script>
