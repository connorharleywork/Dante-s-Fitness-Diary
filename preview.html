}canvas{width:100%;height:210px;background:var(--solid);border:1px solid var(--line);border-radius:22px;padding:8px}.tab{display:none;animation:fade .16s ease}.tab.active{display:block}@keyframes fade{from{opacity:.55;transform:translateY(4px)}to{opacity:1;transform:none}}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;height:calc(var(--nav) + env(safe-area-inset-bottom));padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.8);backdrop-filter:blur(20px);border-top:1px solid var(--line);box-shadow:0 -10px 30px rgba(98,34,76,.1)}body.dark .bottom-nav{background:rgba(18,15,22,.84)}.nav-scroll{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(72px,1fr);gap:6px;height:100%;overflow-x:auto;scrollbar-width:none;max-width:720px;margin:0 auto}.nav-scroll::-webkit-scrollbar{display:none}.nav-btn{border-radius:20px;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:70px;font-size:1.05rem}.nav-btn span{font-size:.66rem;font-weight:950}.nav-btn.active{background:linear-gradient(135deg,rgba(239,93,168,.18),rgba(143,93,232,.14));color:var(--ink);border:1px solid var(--line)}.toast{position:fixed;left:50%;bottom:calc(var(--nav) + 18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);background:#211522;color:white;padding:10px 14px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s;z-index:50;font-size:.82rem;max-width:calc(100% - 26px);text-align:center}body.dark .toast{background:#fbedf7;color:#211522}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.hidden{display:none!important}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    @media(min-width:650px){.metric-grid{grid-template-columns:repeat(4,1fr)}.quick-row{grid-template-columns:repeat(4,1fr)}.grid-auto.desktop-2{grid-template-columns:1fr 1fr}.hero-grid{grid-template-columns:repeat(4,1fr)}.workout-choice{grid-template-columns:1fr 1fr}.missing-inputs{grid-template-columns:repeat(4,1fr)}canvas{height:240px}}

<body>
  <div class="app"><div class="phone">
    <header>
      <div class="topbar">
        <div class="brand"><div class="logo">P1</div><div class="title-wrap"><h1 class="title">Phase 1 Fitness Diary</h1><p class="subtitle" id="headerSubtitle">5 Jun–2 Jul 2026 • Offline diary</p></div></div>
        <div class="header-actions"><button class="btn btn-soft btn-small" id="themeBtn" type="button">🌙</button><button class="btn btn-primary btn-small" id="installBtn" type="button" style="display:none">Install</button></div>
      </div>
      <div class="date-strip"><button class="btn btn-soft btn-icon" id="prevDay" type="button" aria-label="Previous day">‹</button><input type="date" id="datePicker" min="2026-06-05" max="2026-07-02" /><button class="btn btn-soft btn-icon" id="nextDay" type="button" aria-label="Next day">›</button></div>
    </header>
    <main>
      <section id="tab-today" class="tab active"></section><section id="tab-meals" class="tab"></section><section id="tab-workouts" class="tab"></section><section id="tab-cycle" class="tab"></section><section id="tab-mood" class="tab"></section><section id="tab-progress" class="tab"></section><section id="tab-history" class="tab"></section><section id="tab-backup" class="tab"></section><section id="tab-settings" class="tab"></section>
    </main>
  </div></div>
  <nav class="bottom-nav"><div class="nav-scroll"><button class="nav-btn active" data-tab="today" type="button">🏠<span>Today</span></button><button class="nav-btn" data-tab="meals" type="button">🍽️<span>Meals</span></button><button class="nav-btn" data-tab="workouts" type="button">🏋️<span>Workout</span></button><button class="nav-btn" data-tab="cycle" type="button">🌙<span>Cycle</span></button><button class="nav-btn" data-tab="mood" type="button">✨<span>Mood</span></button><button class="nav-btn" data-tab="progress" type="button">📈<span>Weekly</span></button><button class="nav-btn" data-tab="history" type="button">📖<span>History</span></button><button class="nav-btn" data-tab="backup" type="button">🔐<span>Backup</span></button><button class="nav-btn" data-tab="settings" type="button">⚙️<span>Settings</span></button></div></nav>
  <div class="toast" id="toast"></div>

<script>
'use strict';
const STORAGE_KEY='phase1FitnessDiary.mobile.v3';
const OLD_KEYS=['phase1FitnessDiary.mobile.v2','phase1FitnessDiary.mobile.v1'];
const EMERGENCY_KEY='phase1FitnessDiary.mobile.v3.lastGood';
const START_DATE='2026-06-05';
const END_DATE='2026-07-02';
const DAY_MS=86400000;

const defaultSettings={clientName:'Phase 1 Client',caloriesTarget:1800,proteinTarget:130,waterTargetMl:2500,stepsTarget:8000,weightGoalKg:65,startWeightKg:67,cycleLength:28,periodLength:5,lastPeriodStart:'',theme:'light',reminderWeight:true,reminderMeals:true,reminderWater:true,reminderSteps:true,reminderWorkout:true,reminderMood:true,reminderSleep:true,reminderCycle:true,reminderJournal:false};

const workoutTemplates={
  pull:{label:'Pull + easy cardio',type:'training',exercises:[['Assisted pull-ups',3],['Lat pulldown',3],['Cable row',3],['Bicep curls',2],['Face pulls',2],['Easy incline walk / light jog',1]]},
  push:{label:'Push + easy cardio',type:'training',exercises:[['DB chest press',3],['Shoulder press',3],['Lateral raise',3],['Tricep extension',3],['Push-ups',2],['Easy incline walk / light jog',1]]},
  legsA:{label:'Legs A + hamstring mobility',type:'training',exercises:[['Bulgarian split squat',3],['Leg press',3],['Hamstring curl',3],['Plank',3],['Hamstring stretch',2],['Full-body stretch',1]]},
  legsB:{label:'Optional Legs B or long walk',type:'optional',exercises:[['Leg extension',3],['Romanian deadlift',3],['Adductor machine',2],['Abductor machine',2],['Calf raises',3],['Long walk / easy cardio',1]]},
  mobility:{label:'Steps / mobility',type:'recovery',exercises:[['Step target walk',1],['Hamstring mobility',2],['Hip mobility',2],['Easy stretch',1]]},
  rest:{label:'Rest / recovery',type:'recovery',exercises:[['Easy walk if wanted',1],['Meal prep / hydration check',1]]},
  custom:{label:'Custom workout',type:'training',exercises:[]}
};
const weekdayPreset={1:'pull',2:'mobility',3:'push',4:'mobility',5:'legsA',6:'legsB',0:'rest'};
const mealIdeas=['Greek yoghurt + oats/muesli + banana','Chicken/mince + rice/pasta/potato + vegetables','Soup with added chicken, mince, beans or lentils','Egg fried rice with vegetables; measure oil','Snack swaps: yoghurt, popcorn, fruit, biltong, protein shake'];
let state=loadState();
let activeTab='today';
let selectedDate=initialSelectedDate();
let deferredPrompt=null; let toastTimer=null;

function defaultDay(){return {weightKg:'',weightTime:'',waistCm:'',hipsCm:'',thighCm:'',bustCm:'',meals:[],waterMl:0,steps:'',cardioType:'',cardioMinutes:'',workoutStatus:'',workoutPreset:'',workoutDuration:'',workoutPerformance:'',workoutNotes:'',workoutExercises:[],workoutDoneItems:[],mood:'',energy:'',sleepHours:'',stress:'',bleeding:'',symptoms:'',cravings:'',periodStart:false,periodEnd:false,cycleNotes:'',notes:'',manualReminders:{}}}
function defaultCheckin(){return {done:false,wins:'',struggles:'',planAdjustment:'',notes:''}}
function createDefaultState(){const days={}; allDates().forEach(d=>days[d]=defaultDay()); return {version:3,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),settings:{...defaultSettings},days,weeklyCheckins:{1:defaultCheckin(),2:defaultCheckin(),3:defaultCheckin(),4:defaultCheckin()}}}
function loadState(){try{let raw=localStorage.getItem(STORAGE_KEY); if(!raw){for(const k of OLD_KEYS){raw=localStorage.getItem(k); if(raw) break;}} if(!raw) return createDefaultState(); const parsed=JSON.parse(raw); validateState(parsed); const merged=migrateState(parsed); ensureDates(merged); return merged;}catch(err){console.error('Load error',err); try{const emergency=localStorage.getItem(EMERGENCY_KEY); if(emergency){const rec=JSON.parse(emergency);validateState(rec);ensureDates(rec);setTimeout(()=>showToast('Recovered from last safe backup.'),400);return migrateState(rec)}}catch(e){console.error('Recovery failed',e)} setTimeout(()=>alert('Diary data could not be loaded safely. A fresh diary opened. Import a JSON backup from Backup if needed.'),300); return createDefaultState();}}
function validateState(obj){if(!obj||typeof obj!=='object')throw new Error('Backup is empty.'); if(!obj.settings||typeof obj.settings!=='object')throw new Error('Missing settings.'); if(!obj.days||typeof obj.days!=='object')throw new Error('Missing diary days.');}
function migrateState(obj){obj.version=3; obj.settings={...defaultSettings,...(obj.settings||{})}; obj.weeklyCheckins=obj.weeklyCheckins||obj.checkins||{1:defaultCheckin(),2:defaultCheckin(),3:defaultCheckin(),4:defaultCheckin()}; [1,2,3,4].forEach(w=>obj.weeklyCheckins[w]={...defaultCheckin(),...(obj.weeklyCheckins[w]||{})}); return obj;}
function ensureDates(obj=state){allDates().forEach(date=>{obj.days[date]={...defaultDay(),...(obj.days[date]||{})}; const d=obj.days[date]; if(!Array.isArray(d.meals))d.meals=[]; if(!Array.isArray(d.workoutDoneItems))d.workoutDoneItems=[]; if(!Array.isArray(d.workoutExercises))d.workoutExercises=[]; if(!d.manualReminders||typeof d.manualReminders!=='object')d.manualReminders={}; if(!d.workoutPreset)d.workoutPreset=plannedWorkoutKey(date);});}
function saveState(silent=true){try{state.updatedAt=new Date().toISOString(); const currentRaw=localStorage.getItem(STORAGE_KEY); if(currentRaw)localStorage.setItem(EMERGENCY_KEY,currentRaw); localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); if(!silent)showToast('Saved on this device.'); return true;}catch(err){console.error('Save error',err); alert('Saving was blocked, so the latest change may not be stored. Export a backup now if possible. Error: '+err.message); return false;}}
function pad(n){return String(n).padStart(2,'0')} function parseDate(str){const [y,m,d]=String(str).split('-').map(Number);return new Date(y,(m||1)-1,d||1)} function formatDate(date){return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`} function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d} function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/DAY_MS)} function allDates(){const arr=[]; let d=parseDate(START_DATE); while(formatDate(d)<=END_DATE){arr.push(formatDate(d)); d=addDays(d,1)} return arr} function phoneToday(){return formatDate(new Date())} function isWithinPhase(d){return d>=START_DATE&&d<=END_DATE} function clampDate(d){if(!d||d<START_DATE)return START_DATE; if(d>END_DATE)return END_DATE; return d} function initialSelectedDate(){const today=phoneToday(); return isWithinPhase(today)?today:START_DATE} function prettyDate(str){return parseDate(str).toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short',year:'numeric'})} function shortDate(str){return parseDate(str).toLocaleDateString(undefined,{day:'numeric',month:'short'})} function phaseDay(d=selectedDate){return daysBetween(START_DATE,d)+1} function phaseWeek(d=selectedDate){return Math.min(4,Math.max(1,Math.ceil(phaseDay(d)/7)))} function phaseRange(w){const start=formatDate(addDays(parseDate(START_DATE),(w-1)*7));const end=formatDate(addDays(parseDate(start),6));return{start,end:end>END_DATE?END_DATE:end}} function num(v){const n=Number(v);return Number.isFinite(n)?n:0} function avg(arr){const vals=arr.map(Number).filter(n=>Number.isFinite(n)&&n!==0);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0} function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[ch]))} function uid(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():String(Date.now())+Math.random().toString(16).slice(2)}
function getDay(date=selectedDate){if(!state.days[date])state.days[date]=defaultDay(); return state.days[date]} function mealTotals(day=getDay()){return day.meals.reduce((t,m)=>{t.calories+=num(m.calories);t.protein+=num(m.protein);return t},{calories:0,protein:0})}
function plannedWorkoutKey(date=selectedDate){return weekdayPreset[parseDate(date).getDay()]||'mobility'} function plannedWorkout(date=selectedDate){const key=getDay(date).workoutPreset||plannedWorkoutKey(date); return (workoutTemplates[key]||workoutTemplates.custom).label} function makeExercise(name,plannedSets=3){return{id:uid(),name,plannedSets,skipped:false,sets:Array.from({length:Math.max(1,num(plannedSets)||1)},()=>({reps:'',weight:'',notes:''}))}}
function loadTemplateExercises(key){const tpl=workoutTemplates[key]||workoutTemplates.custom; return tpl.exercises.map(([name,sets])=>makeExercise(name,sets))}
function currentCycleDay(date=selectedDate){const start=state.settings.lastPeriodStart;if(!start)return'';const length=Math.max(1,num(state.settings.cycleLength)||28);const diff=daysBetween(start,date);if(diff<0)return'';return(diff%length)+1}
function latestWeight(date=selectedDate){const dates=allDates().filter(d=>d<=date).reverse();for(const d of dates){const w=num(getDay(d).weightKg);if(w>0)return{value:w,date:d}}return{value:'',date:''}}
function weightTrend(){const weights=allDates().map(d=>({date:d,value:num(getDay(d).weightKg)})).filter(x=>x.value>0);if(weights.length<2)return{text:'Need 2 weigh-ins',delta:0};const delta=weights[weights.length-1].value-weights[0].value;return{text:`${delta>0?'+':''}${delta.toFixed(1)} kg`,delta}}
function dayWorkoutLogged(day=getDay()){return !!day.workoutStatus || (Array.isArray(day.workoutExercises)&&day.workoutExercises.some(ex=>ex.sets&&ex.sets.some(s=>s.reps||s.weight)))}
function reminderDefinitions(day=getDay()){const totals=mealTotals(day); const s=state.settings; const list=[]; if(s.reminderWeight)list.push({id:'weight',title:'Log body weight',sub:day.weightKg?`${day.weightKg} kg at ${day.weightTime||'time not added'}`:'Add weight and time recorded',done:!!day.weightKg&&!!day.weightTime}); if(s.reminderMeals)list.push({id:'meals',title:'Log meals',sub:day.meals.length?`${day.meals.length} meal(s), ${Math.round(totals.calories)} kcal`:'Add meals or food notes',done:day.meals.length>0}); if(s.reminderMeals)list.push({id:'protein',title:'Reach protein target',sub:`${Math.round(totals.protein)} / ${s.proteinTarget} g`,done:totals.protein>=num(s.proteinTarget)}); if(s.reminderWater)list.push({id:'water',title:'Drink water',sub:`${day.waterMl||0} / ${s.waterTargetMl} ml`,done:num(day.waterMl)>=num(s.waterTargetMl)}); if(s.reminderSteps)list.push({id:'steps',title:'Log steps/cardio',sub:day.steps?`${day.steps} steps`:'Add steps or cardio minutes',done:num(day.steps)>0||num(day.cardioMinutes)>0}); if(s.reminderWorkout)list.push({id:'workout',title:'Workout status',sub:day.workoutStatus?workoutStatusLabel(day.workoutStatus):'Choose workout done, skipped, rest or no workout',done:dayWorkoutLogged(day)}); if(s.reminderMood)list.push({id:'mood',title:'Log mood + energy',sub:day.mood&&day.energy?`Mood ${day.mood}/5, Energy ${day.energy}/5`:'Add mood and energy',done:!!day.mood&&!!day.energy}); if(s.reminderSleep)list.push({id:'sleep',title:'Log sleep',sub:day.sleepHours?`${day.sleepHours} hours`:'Add sleep hours',done:num(day.sleepHours)>0}); if(s.reminderCycle)list.push({id:'cycle',title:'Cycle/body check',sub:day.bleeding||day.symptoms||day.cravings?'Cycle notes added':'Add symptoms/cravings if relevant',done:!!(day.bleeding||day.symptoms||day.cravings||currentCycleDay())}); if(s.reminderJournal)list.push({id:'journal',title:'Journal note',sub:day.notes?'Note added':'Optional: write a short note',done:!!day.notes}); return list;}
function completionScore(day=getDay()){const defs=reminderDefinitions(day); return defs.length?Math.round(defs.filter(x=>x.done).length/defs.length*100):0} function coreComplete(day=getDay()){return !!day.weightKg&&day.meals.length>0&&num(day.waterMl)>0&&(num(day.steps)>0||num(day.cardioMinutes)>0)&&dayWorkoutLogged(day)&&!!day.mood&&num(day.sleepHours)>0} function streakCount(){let date=clampDate(phoneToday());let count=0;while(date>=START_DATE){if(!coreComplete(getDay(date)))break;count++;date=formatDate(addDays(parseDate(date),-1))}return count}
function weekDates(w){const r=phaseRange(w);return allDates().filter(d=>d>=r.start&&d<=r.end)}
function dayHasWorkoutCompleted(day){return ['completed','done'].includes(String(day.workoutStatus).toLowerCase()) || (day.workoutExercises||[]).some(ex=>(ex.sets||[]).some(s=>s.reps||s.weight))}
function dayHasWorkoutLogged(day){return ['completed','no_workout','rest','skipped'].includes(String(day.workoutStatus).toLowerCase()) || dayHasWorkoutCompleted(day)}
function weekStats(w){const dates=weekDates(w); const calorieDays=dates.filter(d=>mealTotals(getDay(d)).calories>0&&mealTotals(getDay(d)).calories<=num(state.settings.caloriesTarget)).length; const loggedCalories=dates.map(d=>mealTotals(getDay(d)).calories).filter(n=>n>0); const weights=dates.map(d=>num(getDay(d).weightKg)).filter(n=>n>0); const proteinDays=dates.filter(d=>mealTotals(getDay(d)).protein>=num(state.settings.proteinTarget)).length; const waterDays=dates.filter(d=>num(getDay(d).waterMl)>=num(state.settings.waterTargetMl)).length; const stepsDays=dates.filter(d=>num(getDay(d).steps)>=num(state.settings.stepsTarget)).length; const workoutsCompleted=dates.filter(d=>dayHasWorkoutCompleted(getDay(d))).length; const workoutLogged=dates.filter(d=>dayHasWorkoutLogged(getDay(d))).length; const noWorkoutDays=dates.filter(d=>getDay(d).workoutStatus==='no_workout'||getDay(d).workoutStatus==='rest').length; const moodDays=dates.filter(d=>!!getDay(d).mood).length; const sleepDays=dates.filter(d=>num(getDay(d).sleepHours)>0).length; const completion=Math.round(avg(dates.map(d=>completionScore(getDay(d))))||0); return{range:phaseRange(w),dates,avgWeight:avg(weights),avgCalories:avg(loggedCalories),avgProtein:avg(dates.map(d=>mealTotals(getDay(d)).protein).filter(n=>n>0)),avgSteps:avg(dates.map(d=>num(getDay(d).steps)).filter(n=>n>0)),avgSleep:avg(dates.map(d=>num(getDay(d).sleepHours)).filter(n=>n>0)),calorieDays,proteinDays,waterDays,stepsDays,workoutsCompleted,workoutLogged,noWorkoutDays,moodDays,sleepDays,completion,missing:missingForWeek(w)}}
function missingForDay(date){const d=getDay(date),t=mealTotals(d),miss=[]; if(!d.weightKg)miss.push('weight'); if(!t.calories)miss.push('calories'); if(!t.protein)miss.push('protein'); if(!num(d.waterMl))miss.push('water'); if(!num(d.steps)&&!num(d.cardioMinutes))miss.push('steps'); if(!dayHasWorkoutLogged(d))miss.push('workout'); if(!d.mood)miss.push('mood'); if(!d.energy)miss.push('energy'); if(!num(d.sleepHours))miss.push('sleep'); return miss} function missingForWeek(w){return weekDates(w).map(date=>({date,missing:missingForDay(date)})).filter(x=>x.missing.length)}
function setTheme(theme){state.settings.theme=theme;applyTheme();saveState();render()} function applyTheme(){const theme=state.settings.theme||'light';document.body.classList.toggle('dark',theme==='dark');document.getElementById('themeBtn').textContent=theme==='dark'?'☀️':'🌙';document.querySelector('meta[name="theme-color"]').setAttribute('content',theme==='dark'?'#120f16':'#ef5da8')}
function setActiveTab(tab){activeTab=tab;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.id===`tab-${tab}`));document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===tab));render();window.scrollTo({top:0,behavior:'smooth'})} function updateDate(date){selectedDate=clampDate(date);render()} function updateDay(field,value,rerender=true){getDay()[field]=value;saveState();if(rerender)render()} function updateSetting(field,value,rerender=true){if(['caloriesTarget','proteinTarget','waterTargetMl','stepsTarget','weightGoalKg','startWeightKg','cycleLength','periodLength'].includes(field))value=num(value);state.settings[field]=value;saveState();applyTheme();if(rerender)render()}
function render(){ensureDates(); document.getElementById('datePicker').value=selectedDate; const today=phoneToday(); const phoneNote=isWithinPhase(today)?`Phone today: ${prettyDate(today)}`:'Phone today is outside this 4-week phase'; document.getElementById('headerSubtitle').textContent=`Day ${phaseDay(selectedDate)} of 28 • ${phoneNote}`; renderToday();renderMeals();renderWorkouts();renderCycle();renderMood();renderProgress();renderHistory();renderBackup();renderSettings(); if(activeTab==='progress')setTimeout(drawCharts,40)}
function renderToday(){const day=getDay(), totals=mealTotals(day), s=state.settings, trend=weightTrend(), latest=latestWeight(), cycle=currentCycleDay()||'Set period start', score=completionScore(day), checklist=reminderDefinitions(day), remaining=checklist.filter(x=>!x.done).length, phone=phoneToday(); const datePill=selectedDate===phone?'Today from phone date':(isWithinPhase(phone)?`<button class="btn btn-soft btn-small" onclick="updateDate('${phone}')">Jump to phone today</button>`:'Viewing phase date'); document.getElementById('tab-today').innerHTML=`
<div class="hero"><h2>${greeting()}, ${escapeHtml(s.clientName)}</h2><p>${prettyDate(selectedDate)} • Day ${phaseDay()} • ${datePill}</p><div class="hero-grid"><div class="hero-stat"><strong>${score}%</strong><span>Daily logged</span></div><div class="hero-stat"><strong>${streakCount()}🔥</strong><span>Daily streak</span></div><div class="hero-stat"><strong>${cycle}</strong><span>Cycle day</span></div><div class="hero-stat"><strong>${trend.text}</strong><span>Weight trend</span></div></div></div>
<div class="card"><div class="section-title"><h2>Today's live checklist</h2><span class="pill ${remaining?'warn':'good'}">${remaining?remaining+' left':'All ticked'}</span></div><div class="checklist">${checklist.map(checkItem).join('')}</div><p class="hint">This updates live. On non-training days, mark <strong>Did not workout today</strong> in the Workout tab so the day is still counted as logged.</p></div>
<div class="card"><div class="section-title"><h2>Dashboard</h2><span class="pill">Latest: ${latest.value?latest.value+' kg on '+shortDate(latest.date):'No weight yet'}</span></div><div class="metric-grid">${metric('Calories',Math.round(totals.calories)+' kcal',`Target ${s.caloriesTarget}`,pct(totals.calories,s.caloriesTarget),totals.calories>s.caloriesTarget?'warn':'')}${metric('Protein',Math.round(totals.protein)+' g',`Target ${s.proteinTarget} g`,pct(totals.protein,s.proteinTarget),totals.protein>=s.proteinTarget?'good':'')}${metric('Water',(day.waterMl||0)+' ml',`Target ${s.waterTargetMl} ml`,pct(day.waterMl,s.waterTargetMl),num(day.waterMl)>=s.waterTargetMl?'good':'')}${metric('Workout',workoutStatusLabel(day.workoutStatus)||'Not logged',plannedWorkout(),dayWorkoutLogged(day)?100:0,dayWorkoutLogged(day)?'good':'')}</div></div>
<div class="card"><h2>Quick daily inputs</h2><div class="quick-row"><label>Weight kg <input type="number" step="0.1" value="${escapeHtml(day.weightKg)}" onchange="updateDay('weightKg',this.value)"></label><label>Weight time <input type="time" value="${escapeHtml(day.weightTime)}" onchange="updateDay('weightTime',this.value)"></label><label>Steps <input type="number" inputmode="numeric" value="${escapeHtml(day.steps)}" onchange="updateDay('steps',this.value)"></label><label>Sleep hours <input type="number" step="0.1" value="${escapeHtml(day.sleepHours)}" onchange="updateDay('sleepHours',this.value)"></label></div><div class="water-buttons"><button class="btn btn-soft" onclick="addWater(250)">+250</button><button class="btn btn-soft" onclick="addWater(500)">+500</button><button class="btn btn-soft" onclick="addWater(750)">+750</button><button class="btn btn-warn" onclick="updateDay('waterMl',0)">Reset</button></div></div>${renderWeeklyMiniSummary(phaseWeek())}`}
function metric(label,value,sub,percent,tone=''){return`<div class="metric"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div><div class="sub">${escapeHtml(sub)}</div><div class="bar ${tone}" style="--pct:${Math.max(0,Math.min(100,percent||0))}%"><i></i></div></div>`} function pct(v,t){return t?Math.round(num(v)/num(t)*100):0} function checkItem(item){return`<div class="check-item ${item.done?'done':''}"><div class="check-dot">${item.done?'✓':'•'}</div><div class="check-main"><strong>${escapeHtml(item.title)}</strong><span>${escapeHtml(item.sub)}</span></div><span class="pill ${item.done?'good':'warn'}">${item.done?'Done':'To do'}</span></div>`} function smallStat(label,value){return`<div class="card tight"><strong>${escapeHtml(value)}</strong><div class="tiny">${escapeHtml(label)}</div></div>`}
function renderWeeklyMiniSummary(w){const st=weekStats(w);return`<div class="card"><div class="section-title"><h2>Week ${w} snapshot</h2><span class="pill">${shortDate(st.range.start)}–${shortDate(st.range.end)}</span></div><div class="grid-2">${smallStat('Avg weight',st.avgWeight?st.avgWeight.toFixed(1)+' kg':'—')}${smallStat('Avg calories',st.avgCalories?Math.round(st.avgCalories)+' kcal':'—')}${smallStat('Protein days',`${st.proteinDays}/7`)}${smallStat('Workout logged',`${st.workoutLogged}/7`)}</div></div>`}
function renderMeals(){const day=getDay(),totals=mealTotals(day);document.getElementById('tab-meals').innerHTML=`<div class="card"><div class="section-title"><h2>Meals & food notes</h2><span class="pill">${Math.round(totals.calories)} kcal • ${Math.round(totals.protein)} g</span></div><div class="grid-auto desktop-2"><label>Meal time <input id="mealTime" type="time"></label><label>Meal name <input id="mealName" placeholder="Breakfast, lunch, snack..."></label><label>Calories <input id="mealCalories" type="number" inputmode="numeric" placeholder="e.g. 450"></label><label>Protein g <input id="mealProtein" type="number" inputmode="numeric" placeholder="e.g. 35"></label></div><label style="margin-top:10px">Food notes <textarea id="mealNotes" placeholder="What did she eat? Portions? Sauces/oils? Coffee/honey?"></textarea></label><button class="btn btn-primary btn-full" onclick="addMeal()">Add meal</button><p class="hint">Tip: coffee milk + honey counts. Banana chips and oils are calorie-dense, so tracking those helps a lot.</p></div><div class="card"><h2>Meals logged today</h2>${day.meals.length?day.meals.map(mealRow).join(''):'<p class="hint">No meals logged yet.</p>'}</div><div class="card"><h2>Easy meal ideas</h2><div class="checklist">${mealIdeas.map(x=>`<div class="check-item done"><div class="check-dot">•</div><div class="check-main"><strong>${escapeHtml(x)}</strong><span>Keep it simple and repeatable.</span></div></div>`).join('')}</div></div>`}
function mealRow(m,i){return`<div class="meal-row"><div><strong>${escapeHtml(m.name||'Meal')}</strong><span>${escapeHtml(m.time||'No time')} • ${num(m.calories)} kcal • ${num(m.protein)} g protein</span>${m.notes?`<span>${escapeHtml(m.notes)}</span>`:''}</div><div class="row-actions"><button class="btn btn-soft btn-small" onclick="editMeal(${i})">Edit</button><button class="btn btn-danger btn-small" onclick="deleteMeal(${i})">Delete</button></div></div>`}
function addMeal(){const time=document.getElementById('mealTime').value,name=document.getElementById('mealName').value.trim(),cal=document.getElementById('mealCalories').value,pro=document.getElementById('mealProtein').value,notes=document.getElementById('mealNotes').value.trim(); if(!name&&!cal&&!notes){showToast('Add at least a meal name, calories, or note.');return} getDay().meals.push({id:uid(),time,name:name||'Meal',calories:num(cal),protein:num(pro),notes}); saveState(); render(); showToast('Meal added.')} function editMeal(i){const meal=getDay().meals[i]; if(!meal)return; const name=prompt('Meal name:',meal.name||'Meal');if(name===null)return;const calories=prompt('Calories:',meal.calories||'');if(calories===null)return;const protein=prompt('Protein grams:',meal.protein||'');if(protein===null)return;const notes=prompt('Notes:',meal.notes||'');if(notes===null)return;meal.name=name.trim()||'Meal';meal.calories=num(calories);meal.protein=num(protein);meal.notes=notes.trim();saveState();render();showToast('Meal updated.')} function deleteMeal(i){if(!confirm('Delete this meal?'))return;getDay().meals.splice(i,1);saveState();render();showToast('Meal deleted.')}
function renderWorkouts(){const day=getDay(); const preset=day.workoutPreset||plannedWorkoutKey(); const tpl=workoutTemplates[preset]||workoutTemplates.custom; const noWorkout=day.workoutStatus==='no_workout'||day.workoutStatus==='rest'; document.getElementById('tab-workouts').innerHTML=`<div class="card"><div class="section-title"><h2>Workout diary</h2><span class="pill">${escapeHtml(plannedWorkout())}</span></div><p class="hint">Select what she actually did. She can log every set with reps and weight, delete skipped exercises, or add extra exercises.</p><div class="workout-choice"><label>Selected workout <select onchange="changeWorkoutPreset(this.value)">${Object.entries(workoutTemplates).map(([k,t])=>option(k,t.label,preset)).join('')}</select></label><label>Status <select onchange="updateWorkoutStatus(this.value)">${option('', 'Not logged', day.workoutStatus)}${option('completed','Completed workout',day.workoutStatus)}${option('no_workout','Did not workout today',day.workoutStatus)}${option('rest','Planned rest/recovery',day.workoutStatus)}${option('skipped','Skipped planned workout',day.workoutStatus)}</select></label></div><div class="grid-2"><label>Duration min <input type="number" value="${escapeHtml(day.workoutDuration)}" onchange="updateDay('workoutDuration',this.value)"></label><label>Performance ${rangeInput('workoutPerformance',day.workoutPerformance||3,1,5)}</label></div><div class="grid-2"><label>Cardio type <input value="${escapeHtml(day.cardioType)}" placeholder="Run, incline walk..." onchange="updateDay('cardioType',this.value)"></label><label>Cardio minutes <input type="number" value="${escapeHtml(day.cardioMinutes)}" onchange="updateDay('cardioMinutes',this.value)"></label></div><div class="grid-2"><button class="btn ${noWorkout?'btn-good':'btn-soft'}" onclick="markNoWorkout()">${noWorkout?'✓ No workout logged':'Log did not workout today'}</button><button class="btn btn-primary" onclick="prepareExercisesFromPreset(true)">Load/reload selected workout</button></div><p class="hint">Reloading replaces today's exercise list with the selected workout template. Only use it before logging sets, or after exporting a backup if unsure.</p></div><div class="card"><div class="section-title"><h2>Exercises & sets</h2><button class="btn btn-soft btn-small" onclick="addCustomExercise()">+ Add exercise</button></div>${day.workoutExercises.length?day.workoutExercises.map(exerciseCard).join(''):'<p class="hint">No exercises loaded yet. Choose a workout and tap “Load/reload selected workout”, or add a custom exercise.</p>'}</div><div class="card"><h2>Workout notes</h2><label>Notes <textarea onchange="updateDay('workoutNotes',this.value)" placeholder="What felt strong, hard, sore, or improved?">${escapeHtml(day.workoutNotes)}</textarea></label></div>`}
function option(value,label,selected){return`<option value="${escapeHtml(value)}" ${String(selected)===String(value)?'selected':''}>${escapeHtml(label)}</option>`} function workoutStatusLabel(st){return ({completed:'Completed',no_workout:'Did not workout',rest:'Rest/recovery',skipped:'Skipped'}[st]||'')} function rangeInput(field,value,min,max){return`<div class="range-row"><input type="range" min="${min}" max="${max}" value="${escapeHtml(value)}" oninput="this.nextElementSibling.textContent=this.value" onchange="updateDay('${field}',this.value)"><strong>${escapeHtml(value)}</strong></div>`}
function changeWorkoutPreset(key){const day=getDay(); day.workoutPreset=key; if(!day.workoutExercises.length || confirm('Load the exercises for this workout now? This will replace today\'s current exercise list.')){day.workoutExercises=loadTemplateExercises(key)} saveState();render();showToast('Workout selected.')} function prepareExercisesFromPreset(force=false){const day=getDay(); if(day.workoutExercises.length&&!force&&!confirm('Replace today\'s current exercise list?'))return; day.workoutExercises=loadTemplateExercises(day.workoutPreset||plannedWorkoutKey()); if(!day.workoutStatus)day.workoutStatus='completed'; saveState();render();showToast('Workout loaded.')} function updateWorkoutStatus(value){const day=getDay(); day.workoutStatus=value; if(value==='no_workout'||value==='rest'){day.workoutExercises=[];} saveState();render()} function markNoWorkout(){const day=getDay(); day.workoutStatus='no_workout'; day.workoutExercises=[]; saveState();render();showToast('No workout logged for today.')} function addCustomExercise(){const name=prompt('Exercise name:'); if(!name)return; const sets=prompt('How many sets?', '3'); getDay().workoutExercises.push(makeExercise(name.trim(),num(sets)||3)); if(!getDay().workoutStatus)getDay().workoutStatus='completed'; saveState();render();showToast('Exercise added.')} function deleteExercise(id){if(!confirm('Delete this exercise from today?'))return; const day=getDay();day.workoutExercises=day.workoutExercises.filter(ex=>ex.id!==id);saveState();render();showToast('Exercise deleted.')} function toggleExerciseSkip(id){const ex=findExercise(id); if(!ex)return; ex.skipped=!ex.skipped;saveState();render()} function findExercise(id){return (getDay().workoutExercises||[]).find(ex=>ex.id===id)} function addSet(id){const ex=findExercise(id);if(!ex)return;ex.sets.push({reps:'',weight:'',notes:''});saveState();render()} function deleteSet(id,index){const ex=findExercise(id);if(!ex)return;ex.sets.splice(index,1);if(!ex.sets.length)ex.sets.push({reps:'',weight:'',notes:''});saveState();render()} function updateSet(id,index,field,value){const ex=findExercise(id);if(!ex||!ex.sets[index])return;ex.sets[index][field]=value;if(!getDay().workoutStatus)getDay().workoutStatus='completed';saveState(true)} function renameExercise(id){const ex=findExercise(id); if(!ex)return; const name=prompt('Exercise name:',ex.name); if(name===null)return; ex.name=name.trim()||ex.name;saveState();render()}
function exerciseCard(ex){return`<div class="exercise-card"><div class="exercise-top"><div><div class="exercise-name">${escapeHtml(ex.name)} ${ex.skipped?'<span class="pill warn">Skipped</span>':''}</div><div class="tiny">Planned ${ex.plannedSets||ex.sets.length} set(s). Fill in reps and weight used.</div></div><div class="row-actions"><button class="btn btn-soft btn-small" onclick="renameExercise('${ex.id}')">Rename</button><button class="btn btn-warn btn-small" onclick="toggleExerciseSkip('${ex.id}')">${ex.skipped?'Unskip':'Skipped'}</button><button class="btn btn-danger btn-small" onclick="deleteExercise('${ex.id}')">Delete</button></div></div>${(ex.sets||[]).map((s,i)=>setRow(ex.id,s,i)).join('')}<div class="exercise-toolbar"><button class="btn btn-soft btn-small" onclick="addSet('${ex.id}')">+ Add set</button></div></div>`}
function setRow(id,s,i){return`<div class="set-grid"><label>Set ${i+1} reps<input type="number" inputmode="numeric" value="${escapeHtml(s.reps)}" onchange="updateSet('${id}',${i},'reps',this.value)"></label><label>Weight kg<input type="number" step="0.5" value="${escapeHtml(s.weight)}" onchange="updateSet('${id}',${i},'weight',this.value)"></label><label>Note<input value="${escapeHtml(s.notes||'')}" placeholder="RPE/form" onchange="updateSet('${id}',${i},'notes',this.value)"></label><button class="btn btn-danger btn-small" onclick="deleteSet('${id}',${i})">×</button></div>`}
function renderCycle(){const day=getDay(),cycle=currentCycleDay();document.getElementById('tab-cycle').innerHTML=`<div class="card"><div class="section-title"><h2>Cycle tracker</h2><span class="pill">Cycle day ${cycle||'—'}</span></div><p class="hint">This estimates cycle day from the latest period start date in Settings. It is a diary tool only, not medical advice.</p><div class="grid-2"><button class="btn ${day.periodStart?'btn-good':'btn-soft'}" onclick="markPeriodStart()">${day.periodStart?'✓ Period started':'Mark period start'}</button><button class="btn ${day.periodEnd?'btn-good':'btn-soft'}" onclick="markPeriodEnd()">${day.periodEnd?'✓ Period ended':'Mark period end'}</button></div></div><div class="card"><h2>Daily body notes</h2><div class="grid-2"><label>Bleeding <select onchange="updateDay('bleeding',this.value)">${option('', 'None / not logged', day.bleeding)}${option('spotting','Spotting',day.bleeding)}${option('light','Light',day.bleeding)}${option('medium','Medium',day.bleeding)}${option('heavy','Heavy',day.bleeding)}</select></label><label>Cravings <input value="${escapeHtml(day.cravings)}" placeholder="Sweet, salty, none..." onchange="updateDay('cravings',this.value)"></label></div><label style="margin-top:10px">Symptoms <textarea onchange="updateDay('symptoms',this.value)" placeholder="Cramps, bloating, headache, mood changes...">${escapeHtml(day.symptoms)}</textarea></label><label style="margin-top:10px">Cycle notes <textarea onchange="updateDay('cycleNotes',this.value)" placeholder="Anything unusual or important to remember...">${escapeHtml(day.cycleNotes)}</textarea></label></div><div class="card privacy-panel"><h2>Health note</h2><p class="hint">This app is not medical advice. Cycle changes, severe pain, abnormal bleeding, missed periods, or health concerns should be discussed with a qualified healthcare professional.</p></div>`}
function markPeriodStart(){const day=getDay();day.periodStart=true;day.bleeding=day.bleeding||'medium';state.settings.lastPeriodStart=selectedDate;saveState();render();showToast('Period start marked.')} function markPeriodEnd(){const day=getDay();day.periodEnd=true;saveState();render();showToast('Period end marked.')}
function renderMood(){const day=getDay();document.getElementById('tab-mood').innerHTML=`<div class="card"><h2>Mood, energy & journal</h2><label>Mood ${rangeInput('mood',day.mood||3,1,5)}<span class="tiny">${moodLabel(day.mood)}</span></label><label>Energy ${rangeInput('energy',day.energy||3,1,5)}<span class="tiny">${energyLabel(day.energy)}</span></label><label>Stress ${rangeInput('stress',day.stress||3,1,5)}<span class="tiny">${stressLabel(day.stress)}</span></label><label>Sleep hours <input type="number" step="0.1" value="${escapeHtml(day.sleepHours)}" onchange="updateDay('sleepHours',this.value)"></label><label>Journal entry <textarea onchange="updateDay('notes',this.value)" placeholder="What went well? What was hard? Any cravings, hunger, stress, or wins?">${escapeHtml(day.notes)}</textarea></label></div>`}
function renderProgress(){const day=getDay();document.getElementById('tab-progress').innerHTML=`<div class="card"><h2>Measurements</h2><div class="grid-2"><label>Weight kg <input type="number" step="0.1" value="${escapeHtml(day.weightKg)}" onchange="updateDay('weightKg',this.value)"></label><label>Weight time <input type="time" value="${escapeHtml(day.weightTime)}" onchange="updateDay('weightTime',this.value)"></label><label>Waist cm <input type="number" step="0.1" value="${escapeHtml(day.waistCm)}" onchange="updateDay('waistCm',this.value)"></label><label>Hips cm <input type="number" step="0.1" value="${escapeHtml(day.hipsCm)}" onchange="updateDay('hipsCm',this.value)"></label><label>Thigh cm <input type="number" step="0.1" value="${escapeHtml(day.thighCm)}" onchange="updateDay('thighCm',this.value)"></label><label>Bust cm <input type="number" step="0.1" value="${escapeHtml(day.bustCm)}" onchange="updateDay('bustCm',this.value)"></label></div></div><div class="card"><h2>Charts</h2><canvas id="weightCanvas" width="680" height="250"></canvas><div style="height:12px"></div><canvas id="calorieCanvas" width="680" height="250"></canvas></div>${[1,2,3,4].map(renderWeeklyCheckin).join('')}`}
function renderWeeklyCheckin(w){const st=weekStats(w),c=state.weeklyCheckins[w]||defaultCheckin();return`<div class="card"><div class="section-title"><h2>Week ${w} full summary</h2><span class="pill">${shortDate(st.range.start)}–${shortDate(st.range.end)}</span></div><div class="grid-2">${smallStat('Avg weight',st.avgWeight?st.avgWeight.toFixed(1)+' kg':'—')}${smallStat('Avg calories',st.avgCalories?Math.round(st.avgCalories)+' kcal':'—')}${smallStat('Avg protein',st.avgProtein?Math.round(st.avgProtein)+' g':'—')}${smallStat('Avg steps',st.avgSteps?Math.round(st.avgSteps):'—')}${smallStat('Avg sleep',st.avgSleep?st.avgSleep.toFixed(1)+' h':'—')}${smallStat('Calories hit',`${st.calorieDays}/7`)}${smallStat('Protein hit',`${st.proteinDays}/7`)}${smallStat('Water hit',`${st.waterDays}/7`)}${smallStat('Steps hit',`${st.stepsDays}/7`)}${smallStat('Workouts done',`${st.workoutsCompleted}`)}${smallStat('Workout logged',`${st.workoutLogged}/7`)}${smallStat('Mood logged',`${st.moodDays}/7`)}</div>${renderMissingPrompt(w,st)}<label style="margin-top:10px"><input type="checkbox" ${c.done?'checked':''} onchange="updateCheckin(${w},'done',this.checked)" style="width:auto;margin-right:8px"> Weekly check-in completed</label><label>Wins <textarea onchange="updateCheckin(${w},'wins',this.value)">${escapeHtml(c.wins)}</textarea></label><label>Struggles <textarea onchange="updateCheckin(${w},'struggles',this.value)">${escapeHtml(c.struggles)}</textarea></label><label>Adjustment for next week <textarea onchange="updateCheckin(${w},'planAdjustment',this.value)" placeholder="Example: keep calories same, add steps, improve protein...">${escapeHtml(c.planAdjustment)}</textarea></label></div>`}
function renderMissingPrompt(w,st){if(!st.missing.length)return`<div class="card tight" style="margin-top:12px"><strong>✅ No missing core tracking for this week.</strong><div class="tiny">The averages are based on complete entries.</div></div>`;return`<div class="card tight" style="margin-top:12px"><h3>Missing entries to complete before reviewing averages</h3><p class="hint">Fill any amounts she forgot. This improves weekly averages instead of guessing.</p>${st.missing.map(x=>missingDayRow(x.date,x.missing)).join('')}</div>`}
function missingDayRow(date,missing){const day=getDay(date),tot=mealTotals(day);return`<div class="missing-row"><h4>${prettyDate(date)} <span class="pill warn">Missing: ${missing.join(', ')}</span></h4><div class="missing-inputs"><label>Weight<input type="number" step="0.1" value="${escapeHtml(day.weightKg)}" onchange="quickUpdate('${date}','weightKg',this.value)"></label><label>Calories<input type="number" value="${tot.calories?Math.round(tot.calories):''}" onchange="quickMealTotal('${date}','calories',this.value)"></label><label>Protein g<input type="number" value="${tot.protein?Math.round(tot.protein):''}" onchange="quickMealTotal('${date}','protein',this.value)"></label><label>Water ml<input type="number" value="${escapeHtml(day.waterMl||'')}" onchange="quickUpdate('${date}','waterMl',this.value)"></label><label>Steps<input type="number" value="${escapeHtml(day.steps)}" onchange="quickUpdate('${date}','steps',this.value)"></label><label>Sleep h<input type="number" step="0.1" value="${escapeHtml(day.sleepHours)}" onchange="quickUpdate('${date}','sleepHours',this.value)"></label><label>Mood<select onchange="quickUpdate('${date}','mood',this.value)">${option('', 'Not logged', day.mood)}${[1,2,3,4,5].map(n=>option(n,n+'/5',day.mood)).join('')}</select></label><label>Workout<select onchange="quickUpdate('${date}','workoutStatus',this.value)">${option('', 'Not logged', day.workoutStatus)}${option('completed','Completed',day.workoutStatus)}${option('no_workout','Did not workout',day.workoutStatus)}${option('rest','Rest',day.workoutStatus)}${option('skipped','Skipped',day.workoutStatus)}</select></label></div></div>`}
function quickUpdate(date,field,value){getDay(date)[field]=value;saveState();render()} function quickMealTotal(date,field,value){const d=getDay(date);let quick=d.meals.find(m=>m.id==='weekly-quick-total'); if(!quick){quick={id:'weekly-quick-total',name:'Weekly quick total',time:'',calories:0,protein:0,notes:'Added from weekly summary missing-entry prompt.'};d.meals.push(quick)} quick[field]=num(value);saveState();render()}
function updateCheckin(w,field,value){state.weeklyCheckins[w]={...defaultCheckin(),...(state.weeklyCheckins[w]||{})};state.weeklyCheckins[w][field]=value;saveState();render()}
function renderHistory(){document.getElementById('tab-history').innerHTML=`<div class="card"><h2>History</h2><p class="hint">Tap a day to open and edit it. Delete clears that day only.</p>${allDates().map(historyRow).join('')}</div>`} function historyRow(date){const day=getDay(date),tot=mealTotals(day),score=completionScore(day);return`<div class="history-row"><div onclick="updateDate('${date}');setActiveTab('today')"><strong>${prettyDate(date)}</strong><span>${score}% complete • ${Math.round(tot.calories)} kcal • ${day.weightKg?day.weightKg+' kg':'no weight'} • ${workoutStatusLabel(day.workoutStatus)||'workout not logged'}</span></div><div class="row-actions"><button class="btn btn-soft btn-small" onclick="updateDate('${date}');setActiveTab('today')">Open</button><button class="btn btn-danger btn-small" onclick="clearDay('${date}')">Clear</button></div></div>`} function clearDay(date){if(!confirm(`Clear all diary entries for ${prettyDate(date)}?`))return;state.days[date]=defaultDay();state.days[date].workoutPreset=plannedWorkoutKey(date);saveState();render();showToast('Day cleared.')}
function renderBackup(){const sizeKb=Math.round((localStorage.getItem(STORAGE_KEY)||'').length/1024);document.getElementById('tab-backup').innerHTML=`<div class="card privacy-panel"><h2>Privacy</h2><p class="hint"><strong>Her data stays on this phone.</strong> This app uses the browser’s localStorage. There is no login, no server, no cloud database, and no internet requirement for the diary itself.</p><p class="hint">Because the data is only on the device, clearing browser data or losing the phone can delete the diary. Export backups often.</p></div><div class="card"><h2>Clean backup & restore</h2><p class="hint">Current local diary size: <span class="mono">${sizeKb} KB</span>. Last saved: ${state.updatedAt?new Date(state.updatedAt).toLocaleString():'not yet'}</p><div class="grid-auto"><button class="btn btn-primary btn-full" onclick="exportJSON()">Download full JSON backup</button><label class="btn btn-soft btn-full" style="text-align:center;cursor:pointer">Restore from JSON backup<input class="hidden" type="file" accept="application/json,.json" onchange="importJSON(event)"></label><button class="btn btn-good btn-full" onclick="exportWeeklyCSV()">Export weekly progress CSV</button><button class="btn btn-warn btn-full" onclick="exportDailyCSV()">Export full diary CSV</button></div></div><div class="card danger-zone"><h2>Emergency safety</h2><p class="hint">Before every save, the app keeps a last-good local copy. Use this only if something looks wrong after an accidental change/import.</p><div class="grid-2"><button class="btn btn-soft" onclick="restoreLastGood()">Restore last-good copy</button><button class="btn btn-danger" onclick="resetApp()">Reset all data</button></div></div>`}
function renderSettings(){const s=state.settings;document.getElementById('tab-settings').innerHTML=`<div class="card"><h2>Targets & preferences</h2><div class="grid-2"><label>Name<input value="${escapeHtml(s.clientName)}" onchange="updateSetting('clientName',this.value)"></label><label>Theme<select onchange="setTheme(this.value)">${option('light','Light',s.theme)}${option('dark','Dark',s.theme)}</select></label><label>Calorie target<input type="number" value="${escapeHtml(s.caloriesTarget)}" onchange="updateSetting('caloriesTarget',this.value)"></label><label>Protein target g<input type="number" value="${escapeHtml(s.proteinTarget)}" onchange="updateSetting('proteinTarget',this.value)"></label><label>Water target ml<input type="number" value="${escapeHtml(s.waterTargetMl)}" onchange="updateSetting('waterTargetMl',this.value)"></label><label>Steps target<input type="number" value="${escapeHtml(s.stepsTarget)}" onchange="updateSetting('stepsTarget',this.value)"></label><label>Start weight kg<input type="number" step="0.1" value="${escapeHtml(s.startWeightKg)}" onchange="updateSetting('startWeightKg',this.value)"></label><label>Weight goal kg<input type="number" step="0.1" value="${escapeHtml(s.weightGoalKg)}" onchange="updateSetting('weightGoalKg',this.value)"></label><label>Cycle length days<input type="number" value="${escapeHtml(s.cycleLength)}" onchange="updateSetting('cycleLength',this.value)"></label><label>Period length days<input type="number" value="${escapeHtml(s.periodLength)}" onchange="updateSetting('periodLength',this.value)"></label><label>Latest period start<input type="date" value="${escapeHtml(s.lastPeriodStart)}" onchange="updateSetting('lastPeriodStart',this.value)"></label></div></div><div class="card"><h2>Home checklist reminders</h2><div class="checklist">${settingToggle('reminderWeight','Weight + time')}${settingToggle('reminderMeals','Meals + protein')}${settingToggle('reminderWater','Water')}${settingToggle('reminderSteps','Steps/cardio')}${settingToggle('reminderWorkout','Workout status')}${settingToggle('reminderMood','Mood + energy')}${settingToggle('reminderSleep','Sleep')}${settingToggle('reminderCycle','Cycle/body check')}${settingToggle('reminderJournal','Journal note')}</div></div>`}
function settingToggle(field,labelText){const checked=!!state.settings[field];return`<label class="check-item ${checked?'done':''}" style="margin-bottom:0"><input type="checkbox" ${checked?'checked':''} onchange="updateSetting('${field}',this.checked)" style="width:24px;height:24px;accent-color:var(--brand)"><div class="check-main"><strong>${escapeHtml(labelText)}</strong><span>${checked?'Shown on Today checklist':'Hidden from Today checklist'}</span></div><span class="pill ${checked?'good':''}">${checked?'On':'Off'}</span></label>`}
function addWater(amount){getDay().waterMl=num(getDay().waterMl)+amount;saveState();render();showToast(`Added ${amount} ml water.`)} function moodLabel(v){return['','Very low','Low','Okay','Good','Great'][num(v)]||'Not logged'} function energyLabel(v){return['','Empty','Low','Okay','Good','Powerful'][num(v)]||'Not logged'} function stressLabel(v){return['','Very calm','Calm','Manageable','High','Very high'][num(v)]||'Not logged'} function greeting(){const h=new Date().getHours();return h<12?'Morning':h<18?'Afternoon':'Evening'}
function drawCharts(){drawWeightChart();drawCalorieChart()} function drawWeightChart(){const data=allDates().map(d=>({label:shortDate(d),value:num(getDay(d).weightKg)})).filter(x=>x.value>0);drawLineChart('weightCanvas',data,'Weight kg',state.settings.weightGoalKg||65)} function drawCalorieChart(){const data=allDates().map(d=>({label:shortDate(d),value:mealTotals(getDay(d)).calories})).filter(x=>x.value>0);drawLineChart('calorieCanvas',data,'Calories',state.settings.caloriesTarget||1800)}
function drawLineChart(id,data,title,target){const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d'),w=c.width,h=c.height;ctx.clearRect(0,0,w,h);const styles=getComputedStyle(document.body),ink=styles.getPropertyValue('--ink').trim()||'#241522',muted=styles.getPropertyValue('--muted').trim()||'#7e6678',brand=styles.getPropertyValue('--brand').trim()||'#ef5da8',line=styles.getPropertyValue('--line').trim()||'rgba(224,150,190,.35)';ctx.fillStyle=ink;ctx.font='bold 18px system-ui';ctx.fillText(title,18,28);if(!data.length){ctx.fillStyle=muted;ctx.font='14px system-ui';ctx.fillText('Add data to see the chart.',18,58);return}const values=data.map(d=>d.value).concat(target?[target]:[]);let min=Math.min(...values),max=Math.max(...values);if(min===max){min-=1;max+=1}const padX=42,top=44,bottom=42,chartW=w-padX-18,chartH=h-top-bottom;const x=i=>padX+(data.length===1?chartW/2:i*chartW/(data.length-1));const y=v=>top+(max-v)*chartH/(max-min);ctx.strokeStyle=line;ctx.lineWidth=1;for(let i=0;i<4;i++){const yy=top+i*chartH/3;ctx.beginPath();ctx.moveTo(padX,yy);ctx.lineTo(w-18,yy);ctx.stroke()}if(target){const ty=y(target);ctx.strokeStyle='rgba(31,157,106,.75)';ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(padX,ty);ctx.lineTo(w-18,ty);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=muted;ctx.font='12px system-ui';ctx.fillText('Target '+target,padX,Math.max(56,ty-6))}ctx.strokeStyle=brand;ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();data.forEach((d,i)=>i?ctx.lineTo(x(i),y(d.value)):ctx.moveTo(x(i),y(d.value)));ctx.stroke();data.forEach((d,i)=>{ctx.fillStyle=brand;ctx.beginPath();ctx.arc(x(i),y(d.value),5,0,Math.PI*2);ctx.fill()});ctx.fillStyle=muted;ctx.font='12px system-ui';ctx.fillText(String(Math.round(max*10)/10),8,top+4);ctx.fillText(String(Math.round(min*10)/10),8,top+chartH);ctx.fillText(data[0].label,padX,h-14);ctx.textAlign='right';ctx.fillText(data[data.length-1].label,w-18,h-14);ctx.textAlign='left'}
function exportJSON(){saveState();downloadFile(`phase1-diary-backup-${formatDate(new Date())}.json`,JSON.stringify(state,null,2),'application/json');showToast('Backup downloaded.')} function importJSON(event){const file=event.target.files&&event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const incoming=JSON.parse(reader.result);validateState(incoming);const migrated=migrateState(incoming);ensureDates(migrated);if(!confirm('Restore this backup? This will replace the current diary on this phone.'))return;localStorage.setItem(EMERGENCY_KEY,JSON.stringify(state));state=migrated;saveState();applyTheme();selectedDate=initialSelectedDate();render();showToast('Backup restored successfully.')}catch(err){alert('Could not restore backup safely: '+err.message)}finally{event.target.value=''}};reader.onerror=()=>alert('Could not read the backup file.');reader.readAsText(file)}
function exportWeeklyCSV(){const rows=[['week','start_date','end_date','avg_weight_kg','avg_calories','avg_protein_g','avg_steps','avg_sleep_h','calorie_days','protein_days','water_days','steps_days','workouts_completed','workout_logged_days','no_workout_days','mood_days','completion_percent','wins','struggles','adjustment']];[1,2,3,4].forEach(w=>{const st=weekStats(w),c=state.weeklyCheckins[w]||defaultCheckin();rows.push([w,st.range.start,st.range.end,val(st.avgWeight,1),val(st.avgCalories,0),val(st.avgProtein,0),val(st.avgSteps,0),val(st.avgSleep,1),st.calorieDays,st.proteinDays,st.waterDays,st.stepsDays,st.workoutsCompleted,st.workoutLogged,st.noWorkoutDays,st.moodDays,st.completion,c.wins,c.struggles,c.planAdjustment])});downloadFile('phase1-weekly-progress.csv',toCSV(rows),'text/csv');showToast('Weekly CSV downloaded.')} function exportDailyCSV(){const rows=[['date','phase_day','weight_kg','weight_time','calories','protein_g','water_ml','steps','cardio_type','cardio_minutes','workout_status','workout_preset','workout_exercises_json','workout_performance','mood','energy','stress','sleep_hours','cycle_day','bleeding','symptoms','cravings','waist_cm','hips_cm','thigh_cm','bust_cm','notes']];allDates().forEach(d=>{const day=getDay(d),tot=mealTotals(day);rows.push([d,phaseDay(d),day.weightKg,day.weightTime,Math.round(tot.calories),Math.round(tot.protein),day.waterMl,day.steps,day.cardioType,day.cardioMinutes,day.workoutStatus,day.workoutPreset,JSON.stringify(day.workoutExercises||[]),day.workoutPerformance,day.mood,day.energy,day.stress,day.sleepHours,currentCycleDay(d),day.bleeding,day.symptoms,day.cravings,day.waistCm,day.hipsCm,day.thighCm,day.bustCm,day.notes])});downloadFile('phase1-daily-diary.csv',toCSV(rows),'text/csv');showToast('Diary CSV downloaded.')} function val(x,d){return x?Number(x).toFixed(d):''} function toCSV(rows){return rows.map(row=>row.map(cell=>`"${String(cell??'').replace(/"/g,'""')}"`).join(',')).join('\n')} function downloadFile(filename,content,type){try{const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}catch(err){alert('Could not download file: '+err.message)}} function restoreLastGood(){try{const raw=localStorage.getItem(EMERGENCY_KEY);if(!raw){showToast('No last-good copy found.');return}const rec=JSON.parse(raw);validateState(rec);ensureDates(rec);if(!confirm('Restore the last-good local copy?'))return;state=migrateState(rec);saveState();applyTheme();render();showToast('Last-good copy restored.')}catch(err){alert('Could not restore last-good copy: '+err.message)}} function resetApp(){if(!confirm('Reset all diary data on this phone? Export a backup first if needed.'))return;try{localStorage.setItem(EMERGENCY_KEY,JSON.stringify(state))}catch(e){}localStorage.removeItem(STORAGE_KEY);state=createDefaultState();selectedDate=initialSelectedDate();saveState();applyTheme();render();showToast('App reset.')}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200)}
function init(){applyTheme();document.getElementById('datePicker').addEventListener('change',e=>updateDate(e.target.value));document.getElementById('prevDay').addEventListener('click',()=>updateDate(formatDate(addDays(parseDate(selectedDate),-1))));document.getElementById('nextDay').addEventListener('click',()=>updateDate(formatDate(addDays(parseDate(selectedDate),1))));document.getElementById('themeBtn').addEventListener('click',()=>setTheme(state.settings.theme==='dark'?'light':'dark'));document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>setActiveTab(btn.dataset.tab)));window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='inline-flex'});document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('installBtn').style.display='none'});window.addEventListener('error',e=>{console.error(e.error||e.message);try{localStorage.setItem(EMERGENCY_KEY,JSON.stringify(state))}catch(err){}});render();saveState(true)}
init();
</script>
